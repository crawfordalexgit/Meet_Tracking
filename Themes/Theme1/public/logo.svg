<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-label="CoachesEye logo">
  <defs>
    <linearGradient id="lg" x1="0" x2="1">
      <stop offset="0" stop-color="#10E1D5" />
      <stop offset="1" stop-color="#4AD0FF" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="eyeShine" cx="40%" cy="35%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="160" height="160" rx="20" fill="#061E27" />

  <g transform="translate(16,24)" filter="url(#glow)">
    <!-- outer aura -->
    <ellipse cx="56" cy="44" rx="56" ry="44" fill="url(#lg)" opacity="0.06" />
    <!-- eye shape -->
    <path d="M4 44 C28 6 84 6 108 44 C84 82 28 82 4 44 Z" fill="#022E35" stroke="url(#lg)" stroke-width="2" />
    <!-- pupil / iris -->
    <circle cx="56" cy="44" r="20" fill="url(#lg)" />
    <!-- inner shimmer -->
    <circle cx="46" cy="34" r="8" fill="url(#eyeShine)" />
  </g>

  <!-- wordmark -->
  <g transform="translate(18,120)">
    <text x="0" y="0" fill="#BEEFF3" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">CoachesEye</text>
  </g>
</svg>